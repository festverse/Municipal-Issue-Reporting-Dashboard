# ==========================================
# Docker Compose — Local Development Environment
# Municipal Issue Reporting Dashboard
# ==========================================
# Usage:
#   docker-compose up -d        → Start PostgreSQL + pgAdmin
#   docker-compose down         → Stop all containers
#   docker-compose down -v      → Stop + remove data volumes

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: municipal_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: municipal_user
      POSTGRES_PASSWORD: municipal_pass
      POSTGRES_DB: municipal_dashboard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U municipal_user -d municipal_dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  # pgAdmin — Database GUI (optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: municipal_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@municipal.dev
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
